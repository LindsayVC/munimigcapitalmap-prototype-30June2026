function init(){
  document.getElementById('app').innerHTML=
    '<div class="bar">'+
      '<div style="display:flex;gap:6px;align-items:center">'+
        '<span class="tag source">Source</span><span class="tag enabler">Enabler</span><span class="tag intermediary">Intermediary</span><span class="tag destination">Destination</span>'+
      '</div>'+
      '<button class="rbtn" id="rbtn">Reset</button>'+
    '</div>'+
    '<div class="srw"><input type="text" id="srch" placeholder="Search any actor (e.g. IDB, GCF, Meridiam, Tier Two)..."><div class="srd" id="srd"></div></div>'+
    '<div class="legend-note">Lines are colored by their originating Source category. Click a category or named actor to trace its full path; click again to clear.</div>'+
    '<div class="flowwrap" id="flowwrap"><canvas id="cv"></canvas>'+
    '<div class="zone" id="z-source"><div class="zoneh source">Source</div><div class="grprow" id="g-source"></div></div>'+
    '<div class="zone" id="z-enabler"><div class="zoneh enabler">Enabler</div><div class="grprow" id="g-enabler"></div></div>'+
    '<div class="zone" id="z-intermediary"><div class="zoneh intermediary">Intermediary</div><div class="grprow" id="g-intermediary"></div></div>'+
    '<div class="zone" id="z-destination"><div class="zoneh destination">Destination</div><div class="grprow" id="g-destination"></div></div>'+
    '</div>'+
    '<div class="inf" id="inf">Click any category or named actor, or search above, to trace its place in the capital flow.</div>'+
    '<div class="footer">Vantage Collaborative LLC for Mayors Migration Council - Prototype v2</div>';

  var act=null,atype=null,curNode=null;

  function findNode(id,type){
    if(type==='s')return S.find(function(x){return x.id===id;});
    if(type==='en')return EN.find(function(x){return x.id===id;});
    if(type==='int')return I.find(function(x){return x.id===id;});
    if(type==='d')return D.find(function(x){return x.id===id;});
  }

  function gc(id,tp){
    if(tp==='s'){
      var node=findNode(id,'s');
      var intIds=node.i.filter(function(x){return x.indexOf('int-')===0;});
      // Expand to include any intermediary-to-intermediary targets
      var expanded=intIds.slice();
      intIds.forEach(function(iid){
        var iNode=findNode(iid,'int');
        if(iNode&&iNode.i2i){iNode.i2i.forEach(function(t){if(expanded.indexOf(t)<0)expanded.push(t);});}
      });
      return {s:[id],en:node.i.filter(function(x){return x.indexOf('en-')===0;}),int:expanded,d:node.d,color:node.color};
    }
    if(tp==='en'){
      var node=findNode(id,'en');
      var sIds=S.filter(function(s){return s.i.indexOf(id)>=0;}).map(function(s){return s.id;});
      return {s:sIds,en:[id],int:[],d:node.d,color:node.color};
    }
    if(tp==='int'){
      var node=findNode(id,'int');
      var sIds=S.filter(function(s){return s.i.indexOf(id)>=0;}).map(function(s){return s.id;});
      var intIds=[id];
      if(node.i2i){node.i2i.forEach(function(t){if(intIds.indexOf(t)<0)intIds.push(t);});}
      // Also include any intermediary that lists this one as an i2i target (upstream view)
      I.forEach(function(other){
        if(other.i2i&&other.i2i.indexOf(id)>=0&&intIds.indexOf(other.id)<0)intIds.push(other.id);
      });
      var dIds=node.d.slice();
      intIds.forEach(function(iid){
        var iNode=findNode(iid,'int');
        if(iNode){iNode.d.forEach(function(did){if(dIds.indexOf(did)<0)dIds.push(did);});}
      });
      return {s:sIds,en:[],int:intIds,d:dIds,color:node.color};
    }
    if(tp==='d'){
      var sIds=S.filter(function(s){return s.d.indexOf(id)>=0;}).map(function(s){return s.id;});
      var enIds=EN.filter(function(e){return e.d.indexOf(id)>=0;}).map(function(e){return e.id;});
      var intIds=I.filter(function(i){return i.d.indexOf(id)>=0;}).map(function(i){return i.id;});
      // Include upstream intermediaries that feed into these via i2i
      I.forEach(function(other){
        if(other.i2i&&other.i2i.some(function(t){return intIds.indexOf(t)>=0;})&&intIds.indexOf(other.id)<0){
          intIds.push(other.id);
        }
      });
      return {s:sIds,en:enIds,int:intIds,d:[id],color:'#854F0B'};
    }
    return {s:[],en:[],int:[],d:[]};
  }

  function mk(tag,cls,id,html,fn,style){
    var el=document.createElement(tag);
    el.className=cls; if(id)el.id=id; el.innerHTML=html;
    if(style)el.setAttribute('style',style);
    if(fn)el.onclick=fn;
    return el;
  }

  function rndr(){
    ['g-source','g-enabler','g-intermediary','g-destination'].forEach(function(id){document.getElementById(id).innerHTML='';});
    S.forEach(function(s){
      var grp=mk('div','grp',null,'');
      var lbl=s.l+(s.placeholder?' (TBD)':'');
      var st='background:'+s.color+'18;border-color:'+s.color+';color:'+s.color;
      grp.appendChild(mk('div','nc','n-'+s.id,lbl,function(){sel(s.id,'s',s);},st));
      document.getElementById('g-source').appendChild(grp);
    });
    EN.forEach(function(e){
      var grp=mk('div','grp',null,'');
      var st='background:'+e.color+'18;border-color:'+e.color+';color:'+e.color;
      grp.appendChild(mk('div','nc','n-'+e.id,e.l,function(){sel(e.id,'en',e);},st));
      document.getElementById('g-enabler').appendChild(grp);
    });
    I.forEach(function(i){
      var grp=mk('div','grp',null,'');
      var st='background:'+i.color+'18;border-color:'+i.color+';color:'+i.color;
      grp.appendChild(mk('div','nc','n-'+i.id,i.l,function(){sel(i.id,'int',i);},st));
      document.getElementById('g-intermediary').appendChild(grp);
    });
    D.forEach(function(d){
      var grp=mk('div','grp',null,'');
      var st='background:'+d.color+'18;border-color:'+d.color+';color:'+d.color;
      grp.appendChild(mk('div','nc','n-'+d.id,d.l,function(){sel(d.id,'d',d);},st));
      document.getElementById('g-destination').appendChild(grp);
    });
    szc();
  }

  function szc(){
    var fw=document.getElementById('flowwrap');
    var cv=document.getElementById('cv');
    cv.width=fw.offsetWidth*2; cv.height=fw.offsetHeight*2;
    cv.style.width=fw.offsetWidth+'px'; cv.style.height=fw.offsetHeight+'px';
  }

  function ncbox(id){
    var el=document.getElementById('n-'+id);
    if(!el)return null;
    var fw=document.getElementById('flowwrap');
    var er=el.getBoundingClientRect(),fr=fw.getBoundingClientRect();
    return {
      left:(er.left-fr.left)*2, right:(er.right-fr.left)*2,
      top:(er.top-fr.top)*2, bottom:(er.bottom-fr.top)*2,
      cx:(er.left+er.width/2-fr.left)*2, cy:(er.top+er.height/2-fr.top)*2
    };
  }

  function zoneBottom(zoneId){
    var el=document.getElementById(zoneId);
    var fw=document.getElementById('flowwrap');
    var er=el.getBoundingClientRect(),fr=fw.getBoundingClientRect();
    return (er.bottom-fr.top)*2;
  }
  function zoneTop(zoneId){
    var el=document.getElementById(zoneId);
    var fw=document.getElementById('flowwrap');
    var er=el.getBoundingClientRect(),fr=fw.getBoundingClientRect();
    return (er.top-fr.top)*2;
  }

  function routeThroughGap(ctx,b1,b2,gapY,color,laneOffset){
    var x1=b1.cx, y1=b1.bottom;
    var x2=b2.cx, y2=b2.top;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.bezierCurveTo(x1,(y1+y2)/2,x2,(y1+y2)/2,x2,y2);
    ctx.strokeStyle=color;ctx.lineWidth=3;ctx.globalAlpha=0.62;ctx.lineJoin='round';ctx.stroke();ctx.globalAlpha=1;
  }

  function redraw(c){
    szc();
    var cv=document.getElementById('cv');
    var ctx=cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    var color=c.color||'#888';

    var gapSE=(zoneBottom('z-source')+zoneTop('z-enabler'))/2;
    var gapSI=zoneBottom('z-source')+14;
    var gapID=(zoneBottom('z-intermediary')+zoneTop('z-destination'))/2;
    var gapSD=zoneBottom('z-source')+26;
    var gapED=zoneBottom('z-enabler')+14;

    c.s.forEach(function(sid){
      var sNode=findNode(sid,'s');
      var b1=ncbox(sid); if(!b1)return;
      var col=sNode.color||color;
      var lane=0;
      sNode.i.forEach(function(target){
        var tp=target.indexOf('en-')===0?'en':'int';
        if(tp==='en'&&c.en.indexOf(target)<0)return;
        if(tp==='int'&&c.int.indexOf(target)<0)return;
        var b2=ncbox(target); if(!b2)return;
        var gap=tp==='en'?gapSE:gapSI;
        routeThroughGap(ctx,b1,b2,gap,col,lane*5);
        lane++;
      });
      sNode.d.forEach(function(did){
        if(c.d.indexOf(did)<0)return;
        var b2=ncbox(did); if(!b2)return;
        routeThroughGap(ctx,b1,b2,gapSD+(lane*4),col,0);
        lane++;
      });
    });

    c.en.forEach(function(eid){
      var eNode=findNode(eid,'en');
      var b1=ncbox(eid); if(!b1)return;
      var lane=0;
      eNode.d.forEach(function(did){
        if(c.d.indexOf(did)<0)return;
        var b2=ncbox(did); if(!b2)return;
        routeThroughGap(ctx,b1,b2,gapED,eNode.color,lane*4);
        lane++;
      });
    });

    c.int.forEach(function(iid){
      var iNode=findNode(iid,'int');
      var b1=ncbox(iid); if(!b1)return;
      var lane=0;
      iNode.d.forEach(function(did){
        if(c.d.indexOf(did)<0)return;
        var b2=ncbox(did); if(!b2)return;
        routeThroughGap(ctx,b1,b2,gapID,iNode.color,lane*4);
        lane++;
      });
      // Draw intermediary-to-intermediary connections as a same-row arc
      if(iNode.i2i){
        iNode.i2i.forEach(function(targetId){
          if(c.int.indexOf(targetId)<0)return;
          var b2=ncbox(targetId); if(!b2)return;
          var midY=Math.min(b1.top,b2.top)-22;
          ctx.beginPath();
          ctx.moveTo(b1.cx,b1.top);
          ctx.bezierCurveTo(b1.cx,midY,b2.cx,midY,b2.cx,b2.top);
          ctx.strokeStyle=iNode.color;ctx.lineWidth=2.5;ctx.globalAlpha=0.55;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
        });
      }
    });
  }

  function bldInf(node,level){
    var tagcls={s:'source',en:'enabler',int:'intermediary',d:'destination'}[level];
    var tagtxt={s:'Source',en:'Enabler',int:'Intermediary',d:'Destination'}[level];
    var h='<span class="lvltag tag '+tagcls+'">'+tagtxt+'</span>';
    h+='<strong>'+node.l+'</strong>';
    if(node.desc)h+='<span style="color:#666">'+node.desc+'</span>';
    if(node.note)h+='<br><span class="note">! '+node.note+'</span>';
    if(node.i2i&&node.i2i.length){
      var targets=node.i2i.map(function(tid){var t=I.find(function(x){return x.id===tid;});return t?t.l:tid;}).join(', ');
      h+='<div class="fieldlabel">Passes funds to</div><div class="row"><span class="chip">'+targets+'</span></div>';
    }
    var upstreamI=I.filter(function(other){return other.i2i&&other.i2i.indexOf(node.id)>=0;});
    if(upstreamI.length){
      var sources=upstreamI.map(function(x){return x.l;}).join(', ');
      h+='<div class="fieldlabel">Receives funds from</div><div class="row"><span class="chip">'+sources+'</span></div>';
    }
    var aum=node.aum||[];
    if(aum.length){h+='<div class="fieldlabel">Estimated capital available</div><div class="row">';aum.forEach(function(a){h+='<span class="chip">'+a.t+': <b>'+a.v+'</b> ('+a.y+')</span>';});h+='</div>';}
    var subs=node.sub||node.sub_;
    if(subs&&subs.length){
      h+='<div class="fieldlabel">Named entities - click for details</div><div class="row" id="srl">';
      subs.forEach(function(s,idx){h+='<span class="subchip" data-idx="'+idx+'">'+s.name+'</span>';});
      h+='</div><div id="sdt"></div>';
    } else if(node.placeholder){
      h+='<div class="ph">Named entities to be populated.</div>';
    }
    return h;
  }

  function sel(id,tp,node){
    if(act===id){rst();return;}
    act=id;atype=tp;curNode=node;
    var c=gc(id,tp);
    S.forEach(function(s){var el=document.getElementById('n-'+s.id);if(!el)return;el.classList.toggle('dim',c.s.indexOf(s.id)<0);});
    EN.forEach(function(e){var el=document.getElementById('n-'+e.id);if(!el)return;el.classList.toggle('dim',c.en.indexOf(e.id)<0);});
    I.forEach(function(i){var el=document.getElementById('n-'+i.id);if(!el)return;el.classList.toggle('dim',c.int.indexOf(i.id)<0);});
    D.forEach(function(d){var el=document.getElementById('n-'+d.id);if(!el)return;el.classList.toggle('dim',c.d.indexOf(d.id)<0);});
    document.getElementById('inf').innerHTML=bldInf(node,tp);
    var srl=document.getElementById('srl');
    if(srl){srl.querySelectorAll('.subchip').forEach(function(chip){chip.onclick=function(){shwSub(parseInt(chip.getAttribute('data-idx')));};});}
    setTimeout(function(){redraw(c);},60);
  }

  function shwSub(idx){
    var subs=curNode.sub||curNode.sub_;
    if(!subs)return;
    var s=subs[idx]; if(!s)return;
    document.querySelectorAll('.subchip').forEach(function(el){el.classList.remove('sel');});
    var chip=document.querySelector('[data-idx="'+idx+'"]');
    if(chip)chip.classList.add('sel');
    var h='<div class="subdetail"><strong style="display:block;margin-bottom:3px">'+s.name;
    if(s.url)h+=' <a class="linklike" href="'+s.url+'" target="_blank" rel="noopener" style="font-size:10.5px">'+s.url.replace('https://','').replace('http://','')+'</a>';
    h+='</strong>'+s.desc;
    if(s.note)h+='<br><span class="note">! '+s.note+'</span>';
    if(s.aum&&s.aum.length){h+='<div class="fieldlabel">Estimated capital available</div><div class="row">';s.aum.forEach(function(a){h+='<span class="chip">'+a.t+': <b>'+a.v+'</b> ('+a.y+')</span>';});h+='</div>';}
    if(s.donors){h+='<div class="fieldlabel">Actors/donors involved</div><div class="row"><span class="chip">'+s.donors+'</span></div>';}
    if(s.engagement){h+='<div class="fieldlabel">Recommended MMC engagement</div><div style="margin-top:3px">'+s.engagement+'</div>';}
    h+='</div>';
    document.getElementById('sdt').innerHTML=h;
  }

  function rst(){
    act=null;atype=null;curNode=null;
    document.querySelectorAll('.nc').forEach(function(el){el.classList.remove('dim');});
    document.getElementById('inf').textContent='Click any category or named actor, or search above, to trace its place in the capital flow.';
    document.getElementById('srch').value='';
    document.getElementById('srd').innerHTML='';document.getElementById('srd').classList.remove('show');
    var cv=document.getElementById('cv');
    if(cv){var ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);}
  }

  var IDX=[];
  S.forEach(function(s){
    IDX.push({id:s.id,tp:'s',label:s.l,node:s,match:s.l.toLowerCase(),lvl:'Source'});
    (s.sub||[]).forEach(function(x,idx){IDX.push({id:s.id,tp:'s',label:x.name+' ('+s.l+')',node:s,match:x.name.toLowerCase(),subIdx:idx,lvl:'Source actor'});});
  });
  EN.forEach(function(e){
    IDX.push({id:e.id,tp:'en',label:e.l,node:e,match:e.l.toLowerCase(),lvl:'Enabler'});
    (e.sub_||[]).forEach(function(x,idx){IDX.push({id:e.id,tp:'en',label:x.name+' ('+e.l+')',node:e,match:x.name.toLowerCase(),subIdx:idx,lvl:'Enabler actor'});});
  });
  I.forEach(function(i){
    IDX.push({id:i.id,tp:'int',label:i.l,node:i,match:i.l.toLowerCase(),lvl:'Intermediary'});
    (i.sub||[]).forEach(function(x,idx){IDX.push({id:i.id,tp:'int',label:x.name+' ('+i.l+')',node:i,match:x.name.toLowerCase(),subIdx:idx,lvl:'Intermediary actor'});});
  });
  D.forEach(function(d){IDX.push({id:d.id,tp:'d',label:d.l,node:d,match:d.l.toLowerCase(),lvl:'Destination'});});

  var srchEl=document.getElementById('srch');
  var srdEl=document.getElementById('srd');
  srchEl.oninput=function(){
    var q=this.value.trim().toLowerCase();
    srdEl.innerHTML='';
    if(!q){srdEl.classList.remove('show');return;}
    var hits=IDX.filter(function(x){return x.match.indexOf(q)>=0;}).slice(0,16);
    if(!hits.length){srdEl.classList.remove('show');return;}
    hits.forEach(function(h){
      var el=document.createElement('div');
      el.className='sri';
      el.innerHTML='<span>'+h.label+'</span><span class="lvl">'+h.lvl+'</span>';
      el.onclick=function(){
        srdEl.classList.remove('show');srchEl.value=h.label;
        sel(h.id,h.tp,h.node);
        if(h.subIdx!==undefined){setTimeout(function(){shwSub(h.subIdx);},150);}
      };
      srdEl.appendChild(el);
    });
    srdEl.classList.add('show');
  };
  srchEl.onkeydown=function(e){if(e.key==='Escape'){srdEl.classList.remove('show');srchEl.value='';}};
  document.addEventListener('click',function(e){if(!srchEl.contains(e.target)&&!srdEl.contains(e.target)){srdEl.classList.remove('show');}});
  document.getElementById('rbtn').onclick=rst;
  window.addEventListener('resize',function(){if(act&&atype){var c=gc(act,atype);setTimeout(function(){redraw(c);},60);}});

  rndr();
}

init();
</script>
</body>
</html>
